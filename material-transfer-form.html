<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Transfer Form</title>

<meta name="theme-color" content="#1e5a96">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f1f3f5;
  padding:12px;
  color:#222;
}

.container{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:16px;
  border-radius:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  overflow:visible;
}

.header{
  text-align:center;
  border-bottom:2px solid #1e5a96;
  padding-bottom:8px;
  margin-bottom:12px;
}

.header h1{
  font-size:22px;
  color:#1e5a96;
  margin-bottom:4px;
}

.header p{
  font-size:12px;
  color:#666;
}

.form-section{
  border:1px solid #d8d8d8;
  border-radius:4px;
  overflow:hidden;
  margin-bottom:10px;
  break-inside:avoid;
  page-break-inside:avoid;
}

.section-title{
  background:#1e5a96;
  color:white;
  padding:8px 10px;
  font-size:12px;
  font-weight:bold;
}

.section-body{
  padding:10px;
  background:#fafafa;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:8px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:11px;
  font-weight:bold;
  margin-bottom:4px;
  color:#1e5a96;
}

input,
textarea{
  width:100%;
  border:1px solid #cfcfcf;
  border-radius:4px;
  padding:6px;
  font-size:12px;
  font-family:inherit;
  background:white;
}

textarea{
  min-height:40px;
  resize:vertical;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  display:block;
  overflow-x:auto;
}

th{
  background:#34495e;
  color:white;
  padding:6px;
  font-size:11px;
  text-align:left;
  white-space:nowrap;
}

td{
  border:1px solid #ddd;
  padding:4px;
}

table input{
  width:100%;
  border:none;
  padding:4px;
  font-size:11px;
  min-width:70px;
}

.qty{
  text-align:right;
}

.summary{
  text-align:right;
  margin-top:8px;
  font-size:14px;
  font-weight:bold;
  color:#1e5a96;
}

.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:16px;
}

button{
  border:none;
  border-radius:4px;
  padding:10px 16px;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
}

.primary{
  background:#1e5a96;
  color:white;
}

.secondary{
  background:#777;
  color:white;
}

.danger{
  background:#c0392b;
  color:white;
  padding:6px 8px;
  font-size:10px;
}

@media(max-width:768px){

  .form-grid{
    grid-template-columns:1fr;
  }

  .buttons{
    flex-direction:column;
  }

  button{
    width:100%;
  }
}

/* PDF / PRINT */

@media print{

  body{
    background:white;
    padding:0;
  }

  .container{
    box-shadow:none;
    border-radius:0;
    max-width:100%;
    padding:4mm;
  }

  .buttons,
  .danger{
    display:none !important;
  }

  .form-section{
    margin-bottom:5px;
  }

  th{
    background:#34495e !important;
    color:white !important;
    print-color-adjust:exact;
  }

  .section-title{
    background:#1e5a96 !important;
    color:white !important;
    print-color-adjust:exact;
  }

  input,
  textarea{
    border:none;
    background:transparent;
    padding:0;
  }

  textarea{
    min-height:24px;
  }

  tr{
    break-inside:avoid;
    page-break-inside:avoid;
  }
}

</style>
</head>

<body>

<div class="container" id="pdfContent">

<div class="header">
  <h1>MATERIAL TRANSFER FORM</h1>
  <p>Internal Material Movement Record</p>
</div>

<div class="form-section">
  <div class="section-title">FORM INFORMATION</div>

  <div class="section-body">

    <div class="form-grid">

      <div class="form-group">
        <label>Form Number</label>
        <input type="text" id="formNumber">
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="formDate">
      </div>

    </div>

  </div>
</div>

<div class="form-section">
  <div class="section-title">TRANSFER DETAILS</div>

  <div class="section-body">

    <div class="form-grid">

      <div class="form-group">
        <label>From Company</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>To Company</label>
        <input type="text">
      </div>

    </div>

    <div class="form-grid">

      <div class="form-group">
        <label>From Department</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>To Department</label>
        <input type="text">
      </div>

    </div>

    <div class="form-grid">

      <div class="form-group">
        <label>Released By</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Received By</label>
        <input type="text">
      </div>

    </div>

  </div>
</div>

<div class="form-section">

  <div class="section-title">MATERIAL DETAILS</div>

  <div class="section-body">

    <table>

      <thead>
        <tr>
          <th>#</th>
          <th>Part #</th>
          <th>Description</th>
          <th>UOM</th>
          <th>Qty</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="materialRows">

        <tr>
          <td>1</td>
          <td><input type="text"></td>
          <td><input type="text"></td>
          <td><input type="text"></td>
          <td><input type="number" class="qty" value="0"></td>

          <td>
            <button
              type="button"
              class="danger"
              onclick="removeRow(this)">
              Remove
            </button>
          </td>
        </tr>

      </tbody>

    </table>

    <div style="margin-top:8px;">
      <button
        type="button"
        class="secondary"
        onclick="addRow()">
        + Add Row
      </button>
    </div>

    <div class="summary">
      Total Items:
      <span id="totalItems">0</span>
    </div>

  </div>
</div>

<div class="form-section">

  <div class="section-title">PURPOSE / NOTES</div>

  <div class="section-body">

    <div class="form-group">
      <label>Reason for Transfer</label>
      <textarea></textarea>
    </div>

    <div class="form-group" style="margin-top:8px;">
      <label>Additional Notes</label>
      <textarea></textarea>
    </div>

  </div>
</div>

<div class="buttons">

  <button class="secondary" onclick="window.print()">
    Print
  </button>

  <button class="primary" onclick="exportPDF()">
    Download PDF
  </button>

  <button class="primary" onclick="exportExcel()">
    Download Excel
  </button>

</div>

</div>

<script>

document.getElementById('formDate').valueAsDate =
  new Date();

function addRow(){

  const tbody =
    document.getElementById('materialRows');

  const rowCount =
    tbody.rows.length + 1;

  const row =
    document.createElement('tr');

  row.innerHTML = `
    <td>${rowCount}</td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td>
      <input
        type="number"
        class="qty"
        value="0">
    </td>

    <td>
      <button
        type="button"
        class="danger"
        onclick="removeRow(this)">
        Remove
      </button>
    </td>
  `;

  tbody.appendChild(row);

  attachQtyListeners();

  updateTotals();
}

function removeRow(btn){

  btn.closest('tr').remove();

  renumberRows();

  updateTotals();
}

function renumberRows(){

  document
    .querySelectorAll('#materialRows tr')
    .forEach((row,index)=>{

      row.cells[0].innerText =
        index + 1;
    });
}

function attachQtyListeners(){

  document
    .querySelectorAll('.qty')
    .forEach(input=>{

      input.removeEventListener(
        'input',
        updateTotals
      );

      input.addEventListener(
        'input',
        updateTotals
      );
    });
}

function updateTotals(){

  let total = 0;

  document
    .querySelectorAll('.qty')
    .forEach(q=>{

      total +=
        parseFloat(q.value) || 0;
    });

  document.getElementById(
    'totalItems'
  ).innerText = total.toFixed(2);
}

attachQtyListeners();

updateTotals();

function exportPDF(){

  const element =
    document.getElementById('pdfContent');

  const opt = {

    margin:[4,4,4,4],

    filename:
      `MaterialTransferForm_${
        new Date()
        .toISOString()
        .split('T')[0]
      }.pdf`,

    image:{
      type:'jpeg',
      quality:0.98
    },

    html2canvas:{
      scale:2,
      useCORS:true,
      scrollY:0,
      windowWidth:1200
    },

    jsPDF:{
      unit:'mm',
      format:'a4',
      orientation:'portrait'
    },

    pagebreak:{
      mode:['avoid-all']
    }
  };

  html2pdf()
    .set(opt)
    .from(element)
    .save();
}

function exportExcel(){

  const wb =
    XLSX.utils.book_new();

  const data = [];

  data.push([
    "MATERIAL TRANSFER FORM"
  ]);

  data.push([]);

  document
    .querySelectorAll('#materialRows tr')
    .forEach((row,index)=>{

      const inputs =
        row.querySelectorAll('input');

      data.push([
        index + 1,
        inputs[0].value,
        inputs[1].value,
        inputs[2].value,
        inputs[3].value
      ]);
    });

  const ws =
    XLSX.utils.aoa_to_sheet(data);

  XLSX.utils.book_append_sheet(
    wb,
    ws,
    "MTF"
  );

  XLSX.writeFile(
    wb,
    `MaterialTransferForm_${
      new Date()
      .toISOString()
      .split('T')[0]
    }.xlsx`
  );
}

</script>

</body>
</html>
