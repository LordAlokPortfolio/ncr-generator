<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Material Transfer Form</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f3f4f6;
      padding:20px;
      color:#222;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:#fff;
      padding:30px;
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,.1);
      overflow:visible;
    }

    .header{
      text-align:center;
      border-bottom:3px solid #1e5a96;
      padding-bottom:15px;
      margin-bottom:25px;
    }

    .header h1{
      color:#1e5a96;
      font-size:28px;
      margin-bottom:6px;
    }

    .header p{
      color:#666;
      font-size:14px;
    }

    .form-section{
      margin-bottom:24px;
      border:1px solid #dcdcdc;
      border-radius:6px;
      overflow:hidden;
      break-inside:avoid;
      page-break-inside:avoid;
    }

    .section-title{
      background:#1e5a96;
      color:#fff;
      padding:12px 16px;
      font-weight:bold;
      font-size:14px;
    }

    .section-body{
      padding:18px;
      background:#fafafa;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-bottom:18px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    .form-group label{
      font-size:13px;
      font-weight:bold;
      margin-bottom:6px;
      color:#1e5a96;
    }

    input,
    textarea{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:4px;
      font-size:14px;
      font-family:inherit;
      background:white;
    }

    textarea{
      resize:vertical;
      min-height:70px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      background:white;
    }

    th{
      background:#34495e;
      color:white;
      padding:10px;
      font-size:13px;
      text-align:left;
    }

    td{
      border:1px solid #ddd;
      padding:8px;
    }

    table input{
      width:100%;
      border:none;
      padding:6px;
      min-width:80px;
    }

    .qty{
      text-align:right;
    }

    .summary{
      margin-top:15px;
      text-align:right;
      font-size:16px;
      font-weight:bold;
      color:#1e5a96;
    }

    .buttons{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:30px;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:5px;
      padding:12px 22px;
      font-size:14px;
      font-weight:bold;
    }

    .primary{
      background:#1e5a96;
      color:white;
    }

    .secondary{
      background:#777;
      color:white;
    }

    .danger{
      background:#c0392b;
      color:white;
      padding:8px 10px;
      font-size:12px;
    }

    @media(max-width:768px){
      .form-grid{
        grid-template-columns:1fr;
      }

      table{
        font-size:12px;
      }
    }

    /* PRINT / PDF */
    @media print{

      body{
        background:white;
        padding:0;
      }

      .container{
        box-shadow:none;
        border-radius:0;
        max-width:100%;
        padding:8mm;
      }

      .buttons,
      .danger{
        display:none !important;
      }

      .form-section{
        break-inside:avoid;
        page-break-inside:avoid;
      }

      tr{
        break-inside:avoid;
        page-break-inside:avoid;
      }

      th{
        background:#34495e !important;
        color:white !important;
        print-color-adjust:exact;
      }

      .section-title{
        background:#1e5a96 !important;
        color:white !important;
        print-color-adjust:exact;
      }

      input,
      textarea{
        border:none;
        background:transparent;
        padding:0;
      }
    }
  </style>
</head>

<body>

<div class="container" id="pdfContent">

  <div class="header">
    <h1>MATERIAL TRANSFER FORM</h1>
    <p>Internal Material Movement Record</p>
  </div>

  <div class="form-section">
    <div class="section-title">FORM INFORMATION</div>

    <div class="section-body">

      <div class="form-grid">
        <div class="form-group">
          <label>Form Number</label>
          <input type="text" id="formNumber">
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" id="formDate">
        </div>
      </div>

    </div>
  </div>

  <div class="form-section">
    <div class="section-title">FROM (TRANSFERRING COMPANY)</div>

    <div class="section-body">

      <div class="form-grid">
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="fromCompany">
        </div>

        <div class="form-group">
          <label>Department</label>
          <input type="text" id="fromDept">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Contact Person</label>
          <input type="text" id="fromContact">
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="fromLocation">
        </div>
      </div>

    </div>
  </div>

  <div class="form-section">
    <div class="section-title">TO (RECEIVING COMPANY)</div>

    <div class="section-body">

      <div class="form-grid">
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="toCompany">
        </div>

        <div class="form-group">
          <label>Department</label>
          <input type="text" id="toDept">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Contact Person</label>
          <input type="text" id="toContact">
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="toLocation">
        </div>
      </div>

    </div>
  </div>

  <div class="form-section">
    <div class="section-title">MATERIAL DETAILS</div>

    <div class="section-body">

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Part Number</th>
            <th>Description</th>
            <th>UOM</th>
            <th>Qty</th>
            <th></th>
          </tr>
        </thead>

        <tbody id="materialRows">
          <tr>
            <td>1</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="number" class="qty" value="0"></td>
            <td>
              <button type="button" class="danger" onclick="removeRow(this)">
                Remove
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div style="margin-top:15px;">
        <button type="button" class="secondary" onclick="addRow()">
          + Add Row
        </button>
      </div>

      <div class="summary">
        Total Items:
        <span id="totalItems">0</span>
      </div>

    </div>
  </div>

  <div class="form-section">
    <div class="section-title">PURPOSE / REASON</div>

    <div class="section-body">
      <textarea id="reason"></textarea>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">AUTHORIZATION</div>

    <div class="section-body">

      <div class="form-grid">
        <div class="form-group">
          <label>Released By</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Received By</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date">
        </div>
      </div>

    </div>
  </div>

  <div class="form-section">
    <div class="section-title">NOTES</div>

    <div class="section-body">
      <textarea></textarea>
    </div>
  </div>

  <div class="buttons">

    <button class="secondary" onclick="window.print()">
      Print
    </button>

    <button class="primary" onclick="exportPDF()">
      Download PDF
    </button>

    <button class="primary" onclick="exportExcel()">
      Download Excel
    </button>

  </div>

</div>

<script>

document.getElementById('formDate').valueAsDate = new Date();

function addRow(){

  const tbody = document.getElementById('materialRows');

  const rowCount = tbody.rows.length + 1;

  const row = document.createElement('tr');

  row.innerHTML = `
    <td>${rowCount}</td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="number" class="qty" value="0"></td>
    <td>
      <button type="button" class="danger" onclick="removeRow(this)">
        Remove
      </button>
    </td>
  `;

  tbody.appendChild(row);

  attachQtyListeners();

  updateTotals();
}

function removeRow(btn){

  btn.closest('tr').remove();

  renumberRows();

  updateTotals();
}

function renumberRows(){

  document.querySelectorAll('#materialRows tr')
    .forEach((row,index)=>{
      row.cells[0].innerText = index + 1;
    });
}

function attachQtyListeners(){

  document.querySelectorAll('.qty').forEach(input=>{

    input.removeEventListener('input', updateTotals);

    input.addEventListener('input', updateTotals);
  });
}

function updateTotals(){

  let total = 0;

  document.querySelectorAll('.qty').forEach(q=>{

    total += parseFloat(q.value) || 0;
  });

  document.getElementById('totalItems').innerText =
    total.toFixed(2);
}

attachQtyListeners();

updateTotals();

function exportPDF(){

  const element = document.getElementById('pdfContent');

  const opt = {

    margin:[8,8,8,8],

    filename:
      `MaterialTransferForm_${
        new Date().toISOString().split('T')[0]
      }.pdf`,

    image:{
      type:'jpeg',
      quality:1
    },

    html2canvas:{
      scale:3,
      useCORS:true,
      scrollY:0
    },

    jsPDF:{
      unit:'mm',
      format:'a4',
      orientation:'portrait'
    },

    pagebreak:{
      mode:['avoid-all','css','legacy']
    }
  };

  html2pdf()
    .set(opt)
    .from(element)
    .save();
}

function exportExcel(){

  const wb = XLSX.utils.book_new();

  const data = [];

  data.push(["MATERIAL TRANSFER FORM"]);
  data.push([]);

  document.querySelectorAll('#materialRows tr')
    .forEach((row,index)=>{

      const inputs = row.querySelectorAll('input');

      data.push([
        index + 1,
        inputs[0].value,
        inputs[1].value,
        inputs[2].value,
        inputs[3].value
      ]);
    });

  const ws = XLSX.utils.aoa_to_sheet(data);

  XLSX.utils.book_append_sheet(wb, ws, "MTF");

  XLSX.writeFile(
    wb,
    `MaterialTransferForm_${
      new Date().toISOString().split('T')[0]
    }.xlsx`
  );
}

</script>

</body>
</html>
